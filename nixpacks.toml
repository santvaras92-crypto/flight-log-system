# Force clean install and build - Mar 8 2026 v13 - disable webpack cache
[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["rm -rf node_modules/.cache .next", "npm ci --force"]

[phases.build]
cmds = ["rm -rf .next node_modules/.cache", "npm run build"]

[start]
cmd = "npm start"
