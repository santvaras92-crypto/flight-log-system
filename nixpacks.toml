# Force clean build - Mar 8 2026 v15 - explicit webpack alias + purge
[phases.setup]
nixPkgs = ["nodejs_18", "npm-9_x", "openssl"]

[phases.install]
cmds = ["rm -rf .next node_modules/.cache 2>/dev/null; true", "npm ci --force"]

[phases.build]
cmds = ["rm -rf .next node_modules/.cache 2>/dev/null; true", "npm run build"]

[start]
cmd = "npm start"
